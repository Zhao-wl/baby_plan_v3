# Codemagic CI/CD 配置 - 测试版本（支持 AltStore 安装）
workflows:
  flutter-test-build:
    name: Flutter Test Build

    environment:
      flutter: stable
      xcode: latest
      cocoapods: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ios/Pods

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      # Android: 构建 debug APK（无需签名，可直接安装测试）
      - name: Build Android Debug APK
        script: |
          flutter build apk --debug \
            --build-number $(($(date +%s)))

      # iOS: 构建 release 版本（无签名），打包成 IPA 供 AltStore 使用
      - name: Build iOS for AltStore
        script: |
          # 1. 构建 iOS release 版本（无签名）
          flutter build ios --release --no-codesign \
            --build-number $(($(date +%s)))

          # 2. 创建 Payload 目录并复制 app bundle
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/

          # 3. 打包成 IPA
          cd build/ios/ipa
          zip -r ../Runner.ipa Payload

    artifacts:
      - build/app/outputs/apk/debug/*.apk  # Android Debug APK
      - build/ios/Runner.ipa                 # iOS IPA（AltStore 可安装）
      - flutter_build_logs/

    publishing:
      email:
        recipients:
          - 1835990689@qq.com
        notify_on_build_success: true
        notify_on_build_failure: true